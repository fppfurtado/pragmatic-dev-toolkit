name: Validate BACKLOG.md

on:
  push:
    branches: [main]
    paths: [BACKLOG.md]

permissions:
  contents: read
  issues: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run validation
        id: validate
        shell: bash
        run: |
          set +e
          python .github/scripts/validate_backlog.py BACKLOG.md > validation.json
          code=$?
          echo "code=$code" >> "$GITHUB_OUTPUT"
          cat validation.json
          set -e

      - name: Open issue on artifact detected
        if: steps.validate.outputs.code == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          open_count=$(gh issue list --label backlog-merge-artifact --state open --json number --jq 'length')
          if [ "$open_count" -gt 0 ]; then
            echo "skipping issue creation: $open_count open issue(s) already track this artifact"
            exit 0
          fi
          gh label create backlog-merge-artifact \
            --color FFA500 \
            --description "Auto-detected merge artifact in BACKLOG.md" \
            --force
          {
            printf "Validation script detected merge artifacts in \`BACKLOG.md\` after merge to main.\n\n"
            printf "**Commit:** %s\n" "$GITHUB_SHA"
            printf "**Workflow run:** %s/%s/actions/runs/%s\n\n" "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID"
            printf "**Detected problems:**\n\n"
            printf '```json\n'
            cat validation.json
            printf '\n```\n\n'
            printf "Run \`/heal-backlog\` locally on a checkout of \`main\` to propose a cure.\n"
          } > issue-body.md
          gh issue create \
            --title "BACKLOG.md merge artifact detected" \
            --label backlog-merge-artifact \
            --body-file issue-body.md

      - name: Fail on script error
        if: steps.validate.outputs.code != '0' && steps.validate.outputs.code != '1'
        run: |
          echo "::error::validate_backlog.py exited with code ${{ steps.validate.outputs.code }} (script error, not artifact detection)"
          exit 1
